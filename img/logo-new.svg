<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 100">
  <defs>
    <linearGradient id="crystalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb" stop-opacity="0.1"/>
      <stop offset="100%" style="stop-color:#7c3aed" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Icon background circle -->
  <circle cx="46" cy="50" r="40" fill="url(#iconBg)"/>

  <!-- Crystal / molecular structure icon (larger) -->
  <g transform="translate(46, 50)">
    <!-- Outer hexagon -->
    <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16"
             fill="none" stroke="url(#crystalGrad)" stroke-width="2.8" opacity="0.9"/>
    <!-- Inner hexagon fill -->
    <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10"
             fill="url(#crystalGrad)" opacity="0.1"/>

    <!-- Lattice nodes -->
    <circle cx="0" cy="-32" r="4.5" fill="url(#crystalGrad)"/>
    <circle cx="27.7" cy="-16" r="3.8" fill="url(#accentGrad)"/>
    <circle cx="27.7" cy="16" r="4.5" fill="url(#crystalGrad)"/>
    <circle cx="0" cy="32" r="3.8" fill="url(#accentGrad)"/>
    <circle cx="-27.7" cy="16" r="4.5" fill="url(#crystalGrad)"/>
    <circle cx="-27.7" cy="-16" r="3.8" fill="url(#accentGrad)"/>

    <!-- Inner connections -->
    <line x1="0" y1="-32" x2="0" y2="32" stroke="url(#crystalGrad)" stroke-width="1.5" opacity="0.35"/>
    <line x1="-27.7" y1="-16" x2="27.7" y2="16" stroke="url(#crystalGrad)" stroke-width="1.5" opacity="0.35"/>
    <line x1="-27.7" y1="16" x2="27.7" y2="-16" stroke="url(#crystalGrad)" stroke-width="1.5" opacity="0.35"/>

    <!-- Center node (larger, glowing) -->
    <circle cx="0" cy="0" r="6" fill="url(#accentGrad)" opacity="0.3"/>
    <circle cx="0" cy="0" r="4" fill="url(#accentGrad)"/>
  </g>

  <!-- Divider line -->
  <line x1="98" y1="14" x2="98" y2="86" stroke="url(#crystalGrad)" stroke-width="2" opacity="0.3"/>

  <!-- Main title — JARVIS -->
  <text x="114" y="42" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="36" font-weight="900" fill="url(#titleGrad)" letter-spacing="4">
    JARVIS
  </text>

  <!-- Subtitle — PROGRAMMING STUDY -->
  <text x="114" y="64" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="600" fill="#64748b" letter-spacing="4.5">
    PROGRAMMING STUDY
  </text>

  <!-- Student number -->
  <text x="114" y="86" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="15" font-weight="600" fill="#7c3aed" letter-spacing="2">
    Student No. 3229061
  </text>
</svg>
